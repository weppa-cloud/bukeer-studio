#:schema ./node_modules/wrangler/config-schema.json

name = "bukeer-web-public"
main = ".open-next/worker.js"
compatibility_date = "2026-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# OpenNext self-reference (required for ISR revalidation)
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "bukeer-web-public"

# ISR incremental cache
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "bukeer-web-public-cache"

# Queue for time-based revalidation
[[durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[vars]
NEXT_PUBLIC_MAIN_DOMAIN = "bukeer.com"

# Production route required by EPIC #22 runtime gate.
[[routes]]
pattern = "colombiatours.bukeer.com/*"
zone_name = "bukeer.com"

[[routes]]
pattern = "studio.bukeer.com/*"
zone_name = "bukeer.com"

[[routes]]
pattern = "colombiatours.travel/*"
zone_name = "colombiatours.travel"

[[routes]]
pattern = "www.colombiatours.travel/*"
zone_name = "colombiatours.travel"

[[routes]]
pattern = "en.colombiatours.travel/*"
zone_name = "colombiatours.travel"

# ── Staging environment ──────────────────────────────────────────────────────

[env.staging]
name = "bukeer-web-public-staging"
workers_dev = true
preview_urls = true
routes = []

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "bukeer-web-public-staging"

[[env.staging.r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "bukeer-web-public-cache-staging"

[[env.staging.durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[env.staging.vars]
NEXT_PUBLIC_MAIN_DOMAIN = "bukeer.com"

# ── Development environment ────────────────────────────────────────────────

[env.dev]
name = "bukeer-web-public-dev"

[[env.dev.services]]
binding = "WORKER_SELF_REFERENCE"
service = "bukeer-web-public-dev"

[[env.dev.r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "bukeer-web-public-cache-dev"

[[env.dev.durable_objects.bindings]]
name = "NEXT_CACHE_DO_QUEUE"
class_name = "DOQueueHandler"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["DOQueueHandler"]

[env.dev.vars]
NEXT_PUBLIC_MAIN_DOMAIN = "bukeer.com"

[[env.dev.routes]]
pattern = "dev.studio.bukeer.com/*"
zone_name = "bukeer.com"
