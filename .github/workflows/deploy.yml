name: Deploy bukeer-studio to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: npm ci && npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build worker bundle
        run: npm run build:worker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_URL: https://bukeer.com
          NEXT_PUBLIC_MAIN_DOMAIN: bukeer.com

      - name: Enforce compressed size limit (10 MB)
        run: |
          SIZE=$(gzip -c .open-next/worker.js | wc -c)
          echo "Compressed worker size: $SIZE bytes"
          if [ "$SIZE" -ge 10485760 ]; then
            echo "ERROR: Worker bundle exceeds 10 MB compressed limit"
            exit 1
          fi
          echo "Size check passed"

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: .open-next/
          retention-days: 1

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://web-public.bukeer.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: npm ci && npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to staging
        run: npm run build:worker && npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_URL: https://web-public.bukeer.com
          NEXT_PUBLIC_MAIN_DOMAIN: bukeer.com

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://web-public.bukeer.com")
          echo "Health check: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "WARNING: Health check returned $HTTP_STATUS"
          fi

