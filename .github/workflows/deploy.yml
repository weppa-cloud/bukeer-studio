name: Deploy bukeer-studio to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'qa-screenshots/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gates — fast feedback on push to main ──────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache workspace node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/theme-sdk/node_modules
            packages/website-contract/node_modules
          key: deps-${{ runner.os }}-node22-${{ hashFiles('package-lock.json', 'packages/*/package-lock.json') }}

      - name: Verify AI sync artifacts
        run: npm run ai:check

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci --passWithNoTests

  # ── E2E smoke — validates app boot/navigation stability ────────────
  e2e-smoke:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache workspace node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/theme-sdk/node_modules
            packages/website-contract/node_modules
          key: deps-${{ runner.os }}-node22-${{ hashFiles('package-lock.json', 'packages/*/package-lock.json') }}

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright (Chromium)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke E2E
        run: npx playwright test e2e/tests/public-runtime.smoke.spec.ts --project=chromium --no-deps
        env:
          E2E_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          OPENROUTER_AUTH_TOKEN: ci-openrouter-token
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
          OPENROUTER_MODEL: anthropic/claude-sonnet-4-5
          REVALIDATE_SECRET: ci-revalidate-secret
          NEXT_PUBLIC_URL: https://bukeer.com
          NEXT_PUBLIC_MAIN_DOMAIN: bukeer.com

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy — manual only while staging is not in use ──────────────
  # Trigger on demand: gh workflow run deploy.yml --ref main
  deploy-staging:
    needs: [quality, e2e-smoke]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache workspace node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/theme-sdk/node_modules
            packages/website-contract/node_modules
          key: deps-${{ runner.os }}-node22-${{ hashFiles('package-lock.json', 'packages/*/package-lock.json') }}

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: |
          if [ ! -d node_modules ]; then npm ci; fi
          npm run build

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Worker
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_URL: https://bukeer.com
          NEXT_PUBLIC_MAIN_DOMAIN: bukeer.com

      - name: Check Worker bundle size
        run: |
          WORKER_FILE=$(find .open-next -name "*.js" -path "*/worker/*" | head -1)
          if [ -z "$WORKER_FILE" ]; then
            echo "Warning: Could not find worker bundle to check size"
            exit 0
          fi
          WORKER_SIZE=$(stat -c%s "$WORKER_FILE" 2>/dev/null || stat -f%z "$WORKER_FILE")
          MAX_SIZE=$((8 * 1024 * 1024))
          SIZE_KB=$((WORKER_SIZE / 1024))
          echo "Worker bundle size: ${SIZE_KB} KiB"
          if [ "$WORKER_SIZE" -gt "$MAX_SIZE" ]; then
            echo "::error::Worker bundle exceeds 8 MiB limit (${SIZE_KB} KiB). Cloudflare limit is 10 MiB."
            exit 1
          fi
          echo "Bundle size OK (${SIZE_KB} KiB < 8192 KiB)"

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://bukeer.com")
          echo "Health check bukeer.com: HTTP $HTTP_STATUS"

      - name: Rollback instructions on failure
        if: failure()
        run: |
          echo "Deploy failed. To rollback:"
          echo "  cd bukeer-studio && npx wrangler rollback"
