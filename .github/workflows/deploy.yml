name: Deploy bukeer-studio to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build theme-sdk
        working-directory: packages/theme-sdk
        run: npm ci && npm run build

      - name: Build website-contract
        working-directory: packages/website-contract
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to Cloudflare Workers
        run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_URL: https://bukeer.com
          NEXT_PUBLIC_MAIN_DOMAIN: bukeer.com

      - name: Verify deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://bukeer.com")
          echo "Health check bukeer.com: HTTP $HTTP_STATUS"

      - name: Rollback instructions on failure
        if: failure()
        run: |
          echo "Deploy failed. To rollback:"
          echo "  cd bukeer-studio && npx wrangler rollback"
