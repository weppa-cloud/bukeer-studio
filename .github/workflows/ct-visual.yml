name: Playwright Component Tests + Visual Regression

on:
  pull_request:
    paths:
      - 'components/**'
      - '__tests__/ct/**'
      - '__tests__/visual/**'
      - 'playwright-ct.config.ts'
      - 'playwright/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ct:
    if: vars.CI_QUALITY_PROVIDER != 'circleci'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache workspace node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/theme-sdk/node_modules
            packages/website-contract/node_modules
          key: deps-${{ runner.os }}-node22-${{ hashFiles('package-lock.json', 'packages/*/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run component tests + visual regression
        run: npm run test:ct

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ct-report
          path: playwright-report/ct-ct/
          retention-days: 14

      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: test-results/ct-ct/**/*.png
          retention-days: 14
