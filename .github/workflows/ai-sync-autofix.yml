name: AI Sync Autofix

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Run AI sync
        run: npm run ai:sync

      - name: Commit and push if changed
        run: |
          git add -A -- AGENTS.md .agents/skills .agents/commands ai scripts/ai

          if git diff --cached --quiet; then
            echo "No AI sync changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(ai): sync Claude->Codex artifacts [skip ai-sync]"
          git push

