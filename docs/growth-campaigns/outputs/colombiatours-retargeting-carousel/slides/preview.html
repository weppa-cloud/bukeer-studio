<!doctype html>

  <style>

  <main>
    <h1>Colombia Imperdible 9 Días</h1>
    <div class="grid">
      <figure><img src="../exports/01-cover.png" alt="Collage de Bogotá, Medellín y Cartagena con el mensaje 9 días, 3 ciudades."><figcaption>1. 9 días
3 ciudades</figcaption></figure>
<figure><img src="../exports/02-bogota.png" alt="Vista panorámica de Bogotá desde Monserrate."><figcaption>2. Días 1 a 3: Bogotá</figcaption></figure>
