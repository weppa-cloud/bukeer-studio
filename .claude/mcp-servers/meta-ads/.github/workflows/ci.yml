name: Meta Ads MCP CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Build, test, and eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Production eval gate
        run: npm run eval
