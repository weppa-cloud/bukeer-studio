name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to tag, for example v0.1.0
        required: true

jobs:
  release:
    name: Verify and tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          npm run build
          npm test
          npm run eval

      - name: Create tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"
